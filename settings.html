<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>document.addEventListener('touchmove',function(e){if(e.touches.length>1)e.preventDefault();},{passive:false});var _lte=0;document.addEventListener('touchend',function(e){var n=Date.now();if(n-_lte<=300)e.preventDefault();_lte=n;},false);</script>
    <title>Paramètres - Asset Tracker</title>

    <link rel="icon" href="/icons/android-chrome-192x192.png" sizes="192x192">
    <link rel="manifest" href="/manifest.json">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css?v=51">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script>
        if (localStorage.getItem('sidebarState') === 'true') {
            document.documentElement.classList.add('sidebar-collapsed');
        }
    </script>

    <style>
        .settings-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            border-bottom: 2px solid var(--border-color);
            overflow-x: auto;
        }

        .settings-tab {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-tab:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .settings-tab.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        .settings-content {
            display: none;
        }

        .settings-content.active {
            display: block;
        }

        .settings-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .settings-section h3 {
            margin-top: 0;
            margin-bottom: 16px;
            color: var(--text-primary);
            font-size: 18px;
        }
    </style>

    <script>
        // Hide sidebar in iframes
        window.addEventListener('DOMContentLoaded', () => {
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => {
                iframe.addEventListener('load', () => {
                    try {
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        const sidebar = iframeDoc.querySelector('.app-sidebar');
                        const mainContent = iframeDoc.querySelector('.main-content');
                        const mobileHeader = iframeDoc.querySelector('.mobile-header');

                        if (sidebar) sidebar.style.display = 'none';
                        if (mobileHeader) mobileHeader.style.display = 'none';
                        if (mainContent) {
                            mainContent.style.marginLeft = '0';
                            mainContent.style.width = '100%';
                        }
                    } catch (e) {
                        console.log('Cannot modify iframe (same-origin only)');
                    }
                });
            });
        });
    </script>
    <script>
        (function(){if(localStorage.getItem('isAdmin')==='true')return;try{var m=JSON.parse(localStorage.getItem('userModules'));if(!m)return;var map={'dashboard.html':'dashboard','investments.html':'assets','index.html':'transactions','analytics.html':'analytics','watchlist.html':'watchlist','screener.html':'screener','news.html':'news','realestate.html':'realestate','assistant.html':'assistant'};var css='';for(var h in map){if(m[map[h]]===false)css+='.nav-item[href="'+h+'"]{display:none!important}';}if(css){var s=document.createElement('style');s.textContent=css;document.head.appendChild(s);}}catch(e){}})();
    </script>
</head>

<body>
    <header class="mobile-header" id="mobile-header"></header>

    <aside class="app-sidebar" id="app-sidebar"></aside>
    <script src="./src/sidebar-render.js"></script>

    <main class="main-content">
        <div class="container">
            <h1 style="margin-bottom: 32px;">
                <i class="fas fa-cog" style="color: var(--accent-blue);"></i> Paramètres
            </h1>

            <!-- Tabs -->
            <div class="settings-tabs">
                <button class="settings-tab active" data-tab="notifications">
                    <i class="fas fa-bell"></i> Notifications
                </button>
                <button class="settings-tab" data-tab="migration">
                    <i class="fas fa-database"></i> Migration
                </button>
                <button class="settings-tab" data-tab="banks">
                    <i class="fas fa-university"></i> Banques
                </button>
            </div>

            <!-- Notifications Content -->
            <div id="tab-notifications" class="settings-content active">
                <iframe src="notifications.html"
                    style="width: 100%; height: calc(100vh - 200px); min-height: 500px; border: none; border-radius: 8px;"></iframe>
            </div>

            <!-- Migration Content -->
            <div id="tab-migration" class="settings-content">
                <iframe src="migration.html"
                    style="width: 100%; height: calc(100vh - 200px); min-height: 500px; border: none; border-radius: 8px;"></iframe>
            </div>

            <!-- Banks Content -->
            <div id="tab-banks" class="settings-content">
                <iframe src="bank-connections.html"
                    style="width: 100%; height: calc(100vh - 200px); min-height: 500px; border: none; border-radius: 8px;"></iframe>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script type="module" src="/src/settingsApp.js"></script>
    <script type="module" src="/src/sidebar.js"></script>
</body>

</html>
